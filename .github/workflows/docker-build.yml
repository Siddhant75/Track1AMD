name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download Model Weights
        run: |
          mkdir -p models
          pip install -U "huggingface_hub[cli]"
          hf download bartowski/gemma-2-2b-it-GGUF \
              --include "gemma-2-2b-it-Q4_K_M.gguf" \
              --local-dir models

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/amd-track1-agent:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/amd-track1-agent:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/amd-track1-agent:buildcache,mode=max

      - name: End-to-End Integration Test
        run: |
          # Create an empty output directory and input directory
          mkdir -p test_output
          mkdir -p input
          
          # Create a mock tasks.json to simulate the grading harness
          # Include a mix of easy, coding, and hard reasoning tasks
          cat <<EOF > input/tasks.json
          [
            {
              "task_id": "test_easy",
              "prompt": "What is the capital of France?"
            },
            {
              "task_id": "test_code",
              "prompt": "Write a Python function to solve the travelling salesperson problem using dynamic programming with bitmasking."
            },
            {
              "task_id": "test_reasoning",
              "prompt": "Sally has 3 brothers. Each brother has 2 sisters. How many sisters does Sally have?"
            }
          ]
          EOF
          
          # Run the container exactly as the grading harness does
          # Injecting FIREWORKS_API_KEY from secrets and ALLOWED_MODELS
          docker run --rm \
            -v ${{ github.workspace }}/input:/input \
            -v ${{ github.workspace }}/test_output:/output \
            -e FIREWORKS_API_KEY=${{ secrets.FIREWORKS_API_KEY }} \
            -e FIREWORKS_BASE_URL=https://api.fireworks.ai/inference/v1 \
            -e ALLOWED_MODELS="accounts/fireworks/models/qwen2-72b-instruct,accounts/fireworks/models/mixtral-8x22b-instruct,accounts/fireworks/models/llama-v3-70b-instruct" \
            ${{ secrets.DOCKERHUB_USERNAME }}/amd-track1-agent:latest
            
          # Verify results.json exists and contains actual output
          echo "==== RESULTS ===="
          sudo apt-get install -y jq
          jq . test_output/results.json || cat test_output/results.json
          grep -q '"answer":' test_output/results.json || exit 1
