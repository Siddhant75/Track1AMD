name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download Model Weights
        run: |
          mkdir -p models
          pip install -U "huggingface_hub[cli]"
          hf download bartowski/gemma-2-2b-it-GGUF \
              --include "gemma-2-2b-it-Q4_K_M.gguf" \
              --local-dir models

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/amd-track1-agent:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/amd-track1-agent:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/amd-track1-agent:buildcache,mode=max

      - name: End-to-End Integration Test
        run: |
          # Create an empty output directory and input directory
          mkdir -p test_output
          mkdir -p input
          
          # Create a mock tasks.json to simulate the grading harness
          cat <<EOF > input/tasks.json
          [
            {
              "task_id": "test_1",
              "prompt": "What is 2+2?"
            }
          ]
          EOF
          
          # Run the container exactly as the grading harness does
          docker run --rm \
            -v ${{ github.workspace }}/input:/input \
            -v ${{ github.workspace }}/test_output:/output \
            ${{ secrets.DOCKERHUB_USERNAME }}/amd-track1-agent:latest
            
          # Verify results.json exists and contains actual output
          cat test_output/results.json
          grep -q '"answer":' test_output/results.json || exit 1
